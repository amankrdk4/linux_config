;; ===========================================================
;; POLYBAR FINAL BEAUTIFIED CONFIG (STABLE SPACING FIX)
;; ===========================================================

[colors]
background = #1e222a
background-alt = #373b41
foreground = #C5C8C6
primary = #61afef
secondary = #8ABEB7
alert = #A54242
disabled = #707880
success = #98c379
warning = #e5c07b

[bar/mybar]
width = 98%
height = 34
offset-x = 1%
offset-y = 8pt
radius = 12
fixed-center = true

; Explicitly kill tray to remove black box
tray-position = none

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 4pt
border-color = #00000000

padding-left = 1
padding-right = 1
module-margin = 1

separator = "|"
separator-foreground = ${colors.disabled}

; Font-0: Normal Text | Font-1: Larger Icons | Font-2: Extra Large Icons
font-0 = "FiraCode Nerd Font:style=Bold:size=14;4"
font-1 = "FiraCode Nerd Font:size=18;4"
font-2 = "FiraCode Nerd Font:size=19;5"

modules-left = xworkspaces xwindow
modules-center = date
modules-right = mic-toggle pulseaudio memory cpu wlan ping battery

cursor-click = pointer
enable-ipc = true

;; ===========================================================
;; MODULES
;; ===========================================================

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 2
label-occupied = %name%
label-occupied-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%
label-padding = 1

[module/date]
type = internal/date
interval = 1
date = " %I:%M %p"
date-alt = " %Y-%m-%d %I:%M:%S %p"
label = %date%
label-foreground = ${colors.primary}

[module/mic-toggle]
type = custom/script
exec = pactl get-source-mute $(pactl get-default-source) | grep -q "yes" && echo "%{T3}󰍭%{T-}" || echo "%{T3}󰍬%{T-}"
interval = 1
click-left = ~/.config/polybar/scripts/toggle-mic.sh
label-foreground = ${colors.secondary}
label-padding = 1

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = "%percentage%%"
label-volume-foreground = ${colors.primary}
format-muted = <label-muted>
label-muted = "%{T3}󰝟%{T-}"
label-muted-foreground = ${colors.disabled}
ramp-volume-0 = "%{T3}󰕿%{T-}"
ramp-volume-1 = "%{T3}󰖀%{T-}"
ramp-volume-2 = "%{T3}󰕾%{T-}"
ramp-volume-foreground = ${colors.primary}

[module/memory]
type = internal/memory
interval = 3
label = "󰍛 %percentage_used%%"
label-foreground = ${colors.secondary}

[module/cpu]
type = internal/cpu
interval = 3
label = " %percentage%%"
label-foreground = ${colors.primary}

[module/wlan]
type = internal/network
interface-type = wireless
label-connected = " "
label-connected-foreground = ${colors.success}
label-disconnected = "󰖪"
label-disconnected-foreground = ${colors.alert}

[module/ping]
type = custom/script
exec = ~/.config/polybar/scripts/ping.sh
interval = 5
; FIX: Use a fixed width (min-width) so the bar doesn't jump
; 8 characters is usually enough for "󰓅 999 ms"
label = "%{T3}󰓅%{T-} %output%"
label-foreground = ${colors.secondary}
label-min-width = 90
label-alignment = center

[module/battery]
type = internal/battery
full-at = 99
battery = BAT1
adapter = ACAD
poll-interval = 5
format-charging = <label-charging>
format-discharging = <label-discharging>
label-charging = " %percentage%%"
label-discharging = " %percentage%%"
label-full = " %percentage%%"
label-charging-foreground = ${colors.warning}
label-discharging-foreground = ${colors.success}

[settings]
screenchange-reload = true
pseudo-transparency = true
compositing-background = source
compositing-foreground = over
